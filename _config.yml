title: Affinity Network Workshop
description: A four-day workshop on network design — turning a corpus of texts into a visual network as a way of knowing. Bolzano, July 6–9, 2026.
url: https://rodighiero.github.io

# Empty so `bundle exec jekyll serve` serves at http://localhost:4000/ with no
# subpath. Production doesn't rely on this: the GitHub Pages workflow builds with
# the project subpath (`--baseurl "/<repo-name>"`, derived automatically from the
# Pages config), which overrides this value. If you build/deploy by hand, pass
# that flag too.
baseurl: ""

# _publications/ holds the source abstracts for scripts/build-network.py only;
# Jekyll never renders them (underscore-prefixed dirs are excluded from the build).
exclude:
  - scripts
  - requirements.txt
  - README.md
  - Gemfile
  - Gemfile.lock

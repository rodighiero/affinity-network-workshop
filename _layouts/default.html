<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  {% include head-init.html %}
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)">
  <meta name="color-scheme" content="light dark">
  <style>
{% include nunito.css %}
{% include main.css %}
{% for sheet in page.styles %}{% include {{ sheet }} %}
{% endfor %}
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <button class="mode-toggle" type="button" aria-label="Toggle dark mode">
    <svg class="icon-moon" aria-hidden="true" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  {% include site-nav.html %}

  <main id="main" tabindex="-1">
    {{ content }}
  </main>

  <script>
    // ── Mode toggle (shared across pages) ──
    (function() {
      var html = document.documentElement;
      var btn = document.querySelector('.mode-toggle');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var isDark = html.classList.contains('dark') ||
          (!html.classList.contains('light') && window.matchMedia('(prefers-color-scheme: dark)').matches);
        html.classList.remove('dark', 'light');
        var next = isDark ? 'light' : 'dark';
        html.classList.add(next);
        try { localStorage.setItem('colorScheme', next); } catch (e) {}
      });
    })();
  </script>
</body>
</html>
